name: Deploy Doxygen Documentation

on:
  push:
    branches:
      - master # Triggers execution instantly whenever you push code changes to the main branch

permissions:
  contents: read
  pages: write      # Grants permission to safely publish files to GitHub Pages
  id-token: write   # Required for secure authentication with the hosting server

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Install Doxygen Build Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Run Doxygen Compiler
        run: |
          # Modifies configuration parameters on the fly to force a clean, deterministic output path
          (cat docs/Doxyfile; echo "OUTPUT_DIRECTORY = ."; echo "HTML_OUTPUT = docs/html") | doxygen -

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Generated HTML Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Targets the exact, unnested folder path containing your fresh index.html file
          path: 'docs/html'

      - name: Deploy to GitHub Pages Live
        id: deployment
        uses: actions/deploy-pages@v4